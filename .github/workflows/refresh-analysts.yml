name: refresh-analysts

# Daily yfinance pull of analyst recommendations + price targets for every
# tracked stock. Single snapshot per day — _run_refresh() handles dedup
# server-side via the snapshot date.

on:
  schedule:
    # 02:17 UTC daily (= 03:17 BST or 02:17 GMT). The off-the-hour minute
    # avoids the on-the-hour cron rush, which reduces GitHub's typical
    # 5-15 min scheduling slip.
    - cron: '17 2 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-analysts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DB_HOST:     ${{ secrets.DB_HOST }}
      DB_PORT:     ${{ secrets.DB_PORT }}
      DB_NAME:     ${{ secrets.DB_NAME }}
      DB_USER:     ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run analyst refresh
        working-directory: backend
        run: python refresh_analysts.py
