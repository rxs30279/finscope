name: email-rns-digest

# Sends the RNS morning digest at 06:55 and 07:30 Europe/London, weekdays.
# GitHub cron runs in UTC and never auto-shifts for BST/GMT, so we fire
# at both candidate UTC times per slot and let a UK-time guard pick the
# one that actually corresponds to a UK send time. Crons firing at the
# wrong UK hour short-circuit the rest of the job.
#
# Read-only by design: this job does NOT trigger ingest or DeepSeek.
# It just queries rows the refresh-rns workflow has already populated.

on:
  schedule:
    # Daily (not 1-5) because GitHub Actions silently drops weekday-only
    # schedules added over a weekend. The Check UK time step short-circuits
    # weekend firings so no email is sent Sat/Sun.
    - cron: "55 5 * * *" # 05:55 UTC = 06:55 BST (summer)
    - cron: "55 6 * * *" # 06:55 UTC = 06:55 GMT (winter)
    - cron: "30 6 * * *" # 06:30 UTC = 07:30 BST (summer)
    - cron: "30 7 * * *" # 07:30 UTC = 07:30 GMT (winter)
  workflow_dispatch:

concurrency:
  group: email-rns-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM: "Alpha Move AI <digest@alphamoveai.co.uk>"
    steps:
      - name: Check UK time
        id: uk
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          OFFSET=$(TZ=Europe/London date +%z)
          UK_DOW=$(TZ=Europe/London date +%u)

          echo "Schedule: $SCHEDULE"
          echo "UK offset: $OFFSET (day $UK_DOW)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"

          elif [ "$UK_DOW" -gt 5 ]; then
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Weekend in UK — skipping digest."

          else
            SHOULD_SEND=false

            if [ "$OFFSET" = "+0100" ]; then
              # BST
              if [ "$SCHEDULE" = "55 5 * * *" ] || [ "$SCHEDULE" = "30 6 * * *" ]; then
                SHOULD_SEND=true
              fi
            else
              # GMT
              if [ "$SCHEDULE" = "55 6 * * *" ] || [ "$SCHEDULE" = "30 7 * * *" ]; then
                SHOULD_SEND=true
              fi
            fi

            echo "send=$SHOULD_SEND" >> "$GITHUB_OUTPUT"

            if [ "$SHOULD_SEND" != "true" ]; then
              echo "Seasonal duplicate cron — skipping."
            fi
          fi

      - uses: actions/checkout@v4
        if: steps.uk.outputs.send == 'true'

      - uses: actions/setup-python@v5
        if: steps.uk.outputs.send == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.uk.outputs.send == 'true'
        run: pip install -r backend/requirements.txt

      - name: Send RNS digest
        if: steps.uk.outputs.send == 'true'
        working-directory: backend
        run: python email_rns_digest.py
