name: email-rns-digest

# Runs frequently, but only sends at exact UK times (06:30 & 07:30)
on:
  schedule:
    - cron: "*/5 5-8 * * *"  # every 5 mins between 05:00–08:59 UTC
  workflow_dispatch:

concurrency:
  group: email-rns-digest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM: "Alpha Move AI <digest@alphamoveai.co.uk>"

    steps:
      - name: Check UK time
        id: uk
        run: |
          UK_TIME=$(TZ=Europe/London date +%H:%M)
          UK_DOW=$(TZ=Europe/London date +%u)

          echo "UK time: $UK_TIME (day $UK_DOW)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"

          elif [ "$UK_DOW" -gt 5 ]; then
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Weekend — skipping."

          elif [ "$UK_TIME" = "06:30" ] || [ "$UK_TIME" = "07:30" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "Matched send time."

          else
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Not a send time."
          fi

      - uses: actions/checkout@v4
        if: steps.uk.outputs.send == 'true'

      - uses: actions/setup-python@v5
        if: steps.uk.outputs.send == 'true'
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.uk.outputs.send == 'true'
        run: pip install -r backend/requirements.txt

      - name: Send RNS digest
        if: steps.uk.outputs.send == 'true'
        working-directory: backend
        run: python email_rns_digest.py