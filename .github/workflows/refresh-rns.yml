name: refresh-rns

# RNS pipeline: investegate ingest → AI summaries → DeepSeek rank.
# Cron is UTC + best-effort (5-15 min slip during peak load is normal);
# refresh_rns.py has smart catch-up so missed slots self-heal up to ~2.5
# trading days (investegate's listing retention).

on:
  schedule:
    # 06:00-09:45 UTC weekdays — covers the RNS drop window in both
    # BST (07:00-10:45 BST) and GMT (06:00-09:45 GMT).
    - cron: '*/15 6-9 * * 1-5'
    # 10:00 UTC tick — final slot of the GMT-season window.
    - cron: '0 10 * * 1-5'
    # Afternoon catch-up: 16:00 + 17:00 UTC
    # (= 17:00/18:00 BST or 16:00/17:00 GMT).
    - cron: '0 16,17 * * 1-5'
  workflow_dispatch:

# Serialise overlapping firings. New runs queue (not cancel) so each
# pickup sees a fresh staleness window in the catch-up logic.
concurrency:
  group: refresh-rns
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DB_HOST:          ${{ secrets.DB_HOST }}
      DB_PORT:          ${{ secrets.DB_PORT }}
      DB_NAME:          ${{ secrets.DB_NAME }}
      DB_USER:          ${{ secrets.DB_USER }}
      DB_PASSWORD:      ${{ secrets.DB_PASSWORD }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run RNS pipeline
        working-directory: backend
        run: python refresh_rns.py
