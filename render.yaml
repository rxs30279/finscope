services:
  # ── RNS Pipeline Worker ──────────────────────────────────────────────────────
  # Runs the full RNS pipeline (ingest → summaries → LLM rank) when triggered
  # by cron-job.org. Deployed as a lightweight FastAPI web service on Render's
  # free tier. Stays warm because cron-job.org pings it every 15 min during the
  # RNS drop window.
  - type: web
    name: finscope-rns-worker
    runtime: python
    repo: https://github.com/rxs30279/finscope
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CRON_AUTH_TOKEN
        sync: false # set in Render dashboard
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: ALLOWED_ORIGINS
        value: "*"
